<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VozdefeIA</title>
</head>
<script>
function startVoice() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

  if (!SpeechRecognition) {
    alert("Tu navegador no soporta micrófono");
    return;
  }

  const recognition = new SpeechRecognition();
  recognition.lang = "es-ES";
  recognition.continuous = false;
  recognition.interimResults = false;

  recognition.start();

  recognition.onresult = function(event) {
    const text = event.results[0][0].transcript;
    document.getElementById("texto").innerText = "🗣️ " + text;
  };

  recognition.onerror = function(event) {
    console.log("Error:", event.error);
  };
}
</script>
  <body style="font-family: Arial; text-align:center; background:#0b1a33; color:white;">

  <h1>🤖 VozdefeIA</h1>
  <p>Tu app está funcionando</p>
  <button onclick="startVoice()" style="font-size:20px; padding:10px;">
  🎤 Hablar
</button>

<p id="texto"></p>

  <input id="msg" placeholder="Escribe..." />
  <button onclick="enviar()">Enviar</button>

  <div id="chat"></div>

  <script>
    function enviar() {
      const msg = document.getElementById("msg").value;
      document.getElementById("chat").innerHTML += "<p>" + msg + "</p>";
    }
  </script>

function hablar(texto) {
  const synth = window.speechSynthesis;

  if (!synth) {
    alert("Tu navegador no soporta voz");
    return;
  }

  const utterance = new SpeechSynthesisUtterance(texto);

  // 🎚️ Configuración de voz
  utterance.lang = "es-ES";   // Español
  utterance.rate = 1;         // Velocidad
  utterance.pitch = 1;        // Tono
  utterance.volume = 1;       // Volumen

  // 🔊 Seleccionar voz en español si existe
  const voices = synth.getVoices();
  const vozEspañola = voices.find(v => v.lang.includes("es"));

  if (vozEspañola) {
    utterance.voice = vozEspañola;
  }

  synth.speak(utterance);
}
</script>
</script>
